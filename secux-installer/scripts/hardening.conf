# Полностью скрывает указатели ядра через /proc и другие интерфейсы в том числе от root. Усложняет создание эксплойтов под ядро.
kernel.kptr_restrict=2

# Запрещает непривилегированным пользователям чтение логов ядра (dmesg). Предотвращает утечку адресов памяти и системной информации.
kernel.dmesg_restrict=1

# Запрещает использование eBPF непривилегированными пользователями и включает JIT hardening. Защищает от JIT spraying и BPF-эксплойтов.
kernel.unprivileged_bpf_disabled=1
net.core.bpf_jit_harden=2

# Строго ограничивает использование системного вызова ptrace (разрешает только процессам с CAP_SYS_PTRACE). Защищает от инъекций кода в другие процессы.
# Закомментируйте или измените на 1, если нужна отладка кода (gdb, strace) или ломаются игры (Wine/Proton).
kernel.yama.ptrace_scope=2

# Отключает возможность горячей подмены работающего ядра через kexec.
kernel.kexec_load_disabled=1

# Защита сетевого стека от DoS-атак: включает SYN cookies (защита от SYN flood) и предотвращает TIME-WAIT assassination (RFC 1337).
net.ipv4.tcp_syncookies=1
net.ipv4.tcp_rfc1337=1

# Защита от IP-спуфинга (Strict Reverse Path Filter) и блокировка изменения маршрутизации. 
# Запрещает прием и отправку ICMP-redirect пакетов, предотвращая MITM-атаки на уровне локальной сети.
net.ipv4.conf.default.rp_filter=1
net.ipv4.conf.all.rp_filter=1
net.ipv4.conf.all.accept_redirects=0
net.ipv4.conf.default.accept_redirects=0
net.ipv4.conf.all.secure_redirects=0
net.ipv4.conf.default.secure_redirects=0
net.ipv6.conf.all.accept_redirects=0
net.ipv6.conf.default.accept_redirects=0
net.ipv4.conf.all.send_redirects=0
net.ipv4.conf.default.send_redirects=0

# Максимально усиливает рандомизацию адресного пространства (ASLR) для mmap и защищает от NULL pointer dereference атак.
vm.mmap_rnd_bits=32
vm.mmap_rnd_compat_bits=16
vm.mmap_min_addr=4096

# Полностью отключает SysRq, закрывая доступ к низкоуровневым функциям отладки ядра с клавиатуры.
# Внимание: Измените на 176, чтобы оставить только возможность безопасной перезагрузки (REISUB) при зависании системы.
kernel.sysrq=0

# Запрещает непривилегированный доступ к perf (блокирует сбор статистики CPU, защищая от side-channel атак).
kernel.perf_event_paranoid=3

# Запрещает использование системного вызова userfaultfd обычными пользователями (закрывает популярный вектор эксплуатации UAF уязвимостей).
vm.unprivileged_userfaultfd=0

# Запрещает автозагрузку TTY line disciplines (предотвращает LPE через уязвимости в редких/старых модулях ядра).
dev.tty.ldisc_autoload=0

# Включает полную рандомизацию адресного пространства (ASLR) для всех областей памяти программ (стек, куча, библиотеки).
kernel.randomize_va_space=2

# Защита от Race Conditions и спуфинга в world-writable директориях (например, /tmp):
# Строго ограничивает создание симлинков/хардлинков и запись в FIFO/обычные файлы для чужих файлов.
fs.protected_symlinks=1
fs.protected_hardlinks=1
fs.protected_fifos=2
fs.protected_regular=2

# Запрещает создание core dumps для SUID-процессов (защита от утечки паролей, ключей шифрования и токенов из оперативной памяти).
fs.suid_dumpable=0

# Отключает устаревший ioctl TIOCSTI (блокирует метод побега из песочниц через инъекцию команд в хост-терминал).
dev.tty.legacy_tiocsti=0

# Активирует автоматическую перезагрузку системы через 10 секунд после паники ядра. Улучшает доступность системы.
kernel.panic = 10
